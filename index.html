  <script>
    const tabs = document.querySelectorAll('.tab');
    const sections = document.querySelectorAll('section[id]');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          tabs.forEach(t => t.classList.remove('tab--active'));
          const active = document.querySelector(`.tab[href="#${entry.target.id}"]`);
          if (active) active.classList.add('tab--active');
        }
      });
    }, { threshold: 0.4 });
    sections.forEach(s => observer.observe(s));
  </script>

  function setMode(mode) {
    const isProg = mode === 'programming';

    const gridProg   = document.getElementById('grid-programming');
    const outGrid = isProg ? gridDesign : gridProg;
    const inGrid  = isProg ? gridProg   : gridDesign;

    outGrid.style.opacity = '0';
    setTimeout(() => {
      outGrid.style.display = 'none';
      inGrid.style.display  = 'grid';

        inGrid.style.opacity = '1';
